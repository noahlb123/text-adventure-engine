<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Text Adventure Engine</title>
    <link rel="stylesheet" href="style.css">
    <script src="background.js"></script>
    <!--script src="tutorial.txt"></script-->
</head>
<body>
    <canvas id="back-canvas" style="display: block;"></canvas>
    <div id="in-front-canvas">
        <table id="adventure-table"></table> 
        <label id="upload-label" for="upload" class="btn">Upload .txt Adventure</label>
        <input type="file" id="upload" name="file" accept=".txt"/>
        <div id="main"></div>
        <div id="options"></div>
    </div>
    <canvas id="front-most-canvas"></canvas>
<script>
//setup background
B = new Background(document.getElementById('back-canvas'));
F = new Background(document.getElementById('front-most-canvas'));
function anim() {
    B.draw();
    F.hill();
    requestAnimationFrame(anim);
}
anim();

class TextEngine {
    constructor(text, pElm, oElm) {
        this.pElm = pElm;
        this.oElm = oElm;
        this.scene_map = {};
        if (text) {
            this.parse(text);
        }
    }

    loadFirst(text) {
        this.load(this.scene_map[Object.keys(this.scene_map)[0]]);
    }

    escape(s) {
        return s.replace(/\\#/g, '◰').replace(/\\-/g, '◱').replace(/\\:/g, '◲').replace(/\\\`/g, '◳').replace(/\\\\/g, '◴');
    }

    descape(s) {
        return s.replace(/◰/g, '#').replace(/◱/g, '-').replace(/◲/g, ':').replace(/◳/g, '`').replace(/◴/g, '\\');
    }

    parse(text) {
        text = this.escape(text);
        this.text = text;
        this.scene_map = {};
        var scenes = text.trim().slice(text.indexOf('#'), text.length).split('#');
        scenes.forEach(scene => {
            if(!scene) {return;}
            let name = this.descape(scene.slice(0, scene.indexOf('\n')).trim().toLowerCase());
            let body = scene.slice(scene.indexOf('`') + 1, scene.lastIndexOf('`')).trim();
            let options = scene.indexOf('-') != -1 ? scene.slice(scene.indexOf('-') + 1, Math.max(scene.length, scene.lastIndexOf('-') + scene.slice(scene.lastIndexOf('-'), -1).indexOf('\n'))).split('-'): [];
            for(let i = 0; i < options.length; i++) {
                let option = options[i];
                let key, value;
                [key, value] = option.split(':').map(this.descape);
                options[i] = [key.trim(), value.trim().toLowerCase()];
            }
            this.scene_map[name] = {'body': this.descape(body), 'options': options};
        });
    }

    load(scene_obj) {
        table.style.display = 'none';
        this.pElm.innerHTML = '';
        this.oElm.innerHTML = '';
        this.pElm.appendChild(this.oElm);
        scene_obj.body.split('\n').forEach(textLine => {
            let p = document.createElement("p");
            p.innerHTML = textLine == '' ? '<br>': textLine;
            this.pElm.insertBefore(p, this.oElm);
        });
        scene_obj.options.forEach(pair => {
            let p = document.createElement("p");
            p.innerHTML = pair[0];
            p.onclick = () => this.load(this.scene_map[pair[1]]);
            this.oElm.appendChild(p);
        });
    }
}

TE = new TextEngine('', document.getElementById('main'), document.getElementById('options'));

//update table
const table = document.getElementById('adventure-table');
function updateTable() {
    function createTd() {
        let td = document.createElement("td");
        td.width = win_width / nCol;
        td.height = win_width / nCol;
        return td;
    }
    function insertCell(engine, html, row) {
        let td = createTd();
        td.onclick = () => engine.loadFirst();
        td.innerHTML = html;
        row.appendChild(td);
    }
    table.innerHTML = '';
    let advKeys = Object.keys(adventures);
    let win_width = window.innerWidth;
    let nCol = win_width < 1000 ? 2: 4;
    let nRow = Math.ceil(advKeys.length / nCol);
    for(let r = 0; r < nRow; r++) {
        let row = document.createElement("tr");
        table.appendChild(row);
        for(let c = 0; c < nCol; c++) {
            let index = c + nCol * r;
            if(index >= advKeys.length) {break;}
            if (index == 0) {
                let td = createTd();
                td.appendChild(inputLabel);
                inputLabel.appendChild(inputElm);
                row.appendChild(td);
            } else {
                insertCell(adventures[advKeys[index]], advKeys[index], row);
            }
        }
    }
}

//read input files
inputElm = document.getElementById('upload');
inputLabel = document.getElementById('upload-label');
var adventures = {'input': inputElm};
inputElm.addEventListener('change', () => {
    const file = inputElm.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.readAsText(file, 'UTF-8');
    reader.onload = function({ target }) {
        adventures[file.name.slice(0, file.name.length - 4)] = new TextEngine(
            target.result,
            document.getElementById('main'),
            document.getElementById('options'));
        updateTable();
    }
    reader.onerror = function() {
        console.log('error reading file');
    }
});

//load the tutorial adventure
try {
    fetch('./tutorial.txt').then(response => {
        adventures.append({'Tutorial': new TextEngine(
                response.text(),
                document.getElementById('main'),
                document.getElementById('options'))
            });
        });
} catch(e) {console.log(e);}
updateTable();

window.onresize = () => {
    updateTable();
}
</script>
</body>
</html>
